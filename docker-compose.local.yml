version: "3.9"

name: qa-local

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "1024k"
    max-file: "10"

x-services-defaults: &services_defaults
  restart: unless-stopped
  env_file: .env
  networks:
    - internal
  logging: *default-logging

services:
  traefik:
    <<: *services_defaults
    image: traefik:v3.4
    container_name: traefik
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"

      - "--api.dashboard=true"
      - "--accesslog=true"
      - "--log.level=INFO"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.service=api@internal"

  app:
    <<: *services_defaults
    container_name: qa-app
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    command: ["go", "run", "cmd/main.go", "--config=/app/config/application-docker.yaml"]
    volumes:
      - ./:/app
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka0:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.localhost`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.services.app.loadbalancer.server.port=8080"

  postgres:
    <<: *services_defaults
    image: postgres:16-alpine
    container_name: qa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      start_period: 20s
      interval: 10s
      retries: 10
      timeout: 5s

  migrator:
    <<: *services_defaults
    image: arigaio/atlas:latest-community
    container_name: qa-migrator
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - migrate
      - apply
      - --dir=file://migrations
      - --url=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@qa-postgres:5432/${POSTGRES_DB}?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"

  swagger-ui:
    <<: *services_defaults
    image: swaggerapi/swagger-ui
    container_name: qa-swagger-ui
    expose:
      - "8080"
    environment:
      - SWAGGER_JSON=/docs/user_openapi.yaml
      - URLS=[{"url":"/docs/user_openapi.yaml","name":"Client API"}]
    volumes:
      - ./docs:/usr/share/nginx/html/docs
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swagger.rule=Host(`swagger.localhost`)"
      - "traefik.http.routers.swagger.entrypoints=websecure"
      - "traefik.http.services.swagger.loadbalancer.server.port=8080"

  kafka0:
    <<: *services_defaults
    image: apache/kafka:3.9.0
    hostname: kafka0
    container_name: kafka0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka0:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka0:29092,CONTROLLER://kafka0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka0:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  init-kafka:
    <<: *services_defaults
    image: apache/kafka:3.9.0
    depends_on:
      - kafka0
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: |
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka0:29092 --create --if-not-exists --topic hr.personal --replication-factor 1 --partitions 1 && \
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka0:29092 --create --if-not-exists --topic hr.positions --replication-factor 1 --partitions 1 && \
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka0:29092 --create --if-not-exists --topic hr.history --replication-factor 1 --partitions 1

  akhq:
    <<: *services_defaults
    image: tchiotludo/akhq:latest
    container_name: qa-akhq
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka-server:
              properties:
                bootstrap.servers: "kafka0:29092"
    depends_on:
      - kafka0
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.akhq.rule=Host(`akhq.localhost`)"
      - "traefik.http.routers.akhq.entrypoints=websecure"
      - "traefik.http.services.akhq.loadbalancer.server.port=8080"

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge

volumes:
  postgres-dev:
